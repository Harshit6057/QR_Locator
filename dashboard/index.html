<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Smart Tracking System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4F46E5;
      --bg-color: #F1F5F9;
      --card-bg: #FFFFFF;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --border-color: #E2E8F0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 32px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.025em;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background-color: #F8FAFC;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 16px 24px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
      color: var(--text-main);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover {
      background-color: #F8FAFC;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-success {
      background-color: #DEF7EC;
      color: #03543F;
    }

    .badge-warning {
      background-color: #FEF3C7;
      color: #92400E;
    }

    .map-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .map-link:hover {
      text-decoration: underline;
    }

    .empty-state {
      padding: 48px;
      text-align: center;
      color: var(--text-muted);
    }

    .device-info {
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Tracking Dashboard</h1>
      <button onclick="fetchLogs()" style="background:var(--primary);color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:500;">Refresh Data</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>QR ID</th>
            <th>Scanned At</th>
            <th>IP Address</th>
            <th>Location</th>
            <th>Device Info</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="5" class="empty-state">Loading data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    async function fetchLogs() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Loading data...</td></tr>';
      
      try {
        const response = await fetch('/api/logs');
        const data = await response.json();
        
        if (data.error) {
          tbody.innerHTML = `<tr><td colspan="5" class="empty-state" style="color:red">Error: ${data.error}</td></tr>`;
          return;
        }

        if (data.logs.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No scan logs found.</td></tr>';
          return;
        }

        tbody.innerHTML = '';
        data.logs.forEach(log => {
          const row = document.createElement('tr');
          
          const date = new Date(log.scanned_at || log.created_at || Date.now()).toLocaleString();
          
          let locationCell = '<span class="badge badge-warning">IP Only</span>';
          if (log.latitude && log.longitude) {
            locationCell = `
              <span class="badge badge-success" style="margin-bottom: 4px; display: inline-block;">GPS Exact</span><br>
              <a href="https://www.google.com/maps?q=${log.latitude},${log.longitude}" target="_blank" class="map-link">
                View on Map
              </a>
            `;
          }

          row.innerHTML = `
            <td style="font-weight: 600;">${log.qr_id}</td>
            <td>${date}</td>
            <td style="font-family: monospace;">${log.ip_address}</td>
            <td>${locationCell}</td>
            <td class="device-info" title="${log.device_info}">${log.device_info}</td>
          `;
          
          tbody.appendChild(row);
        });

      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="5" class="empty-state" style="color:red">Failed to connect to server.</td></tr>`;
      }
    }

    // Initial load
    fetchLogs();
  </script>
</body>
</html>
